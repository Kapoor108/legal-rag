version: "3.9"

services:
  # ── App (Express + React SPA) ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antigravity_app
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    # No longer depends on local Qdrant — using Qdrant Cloud API
